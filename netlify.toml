[build]
  command = "npm run build"
  publish = "dist"

# Prevent SPA routes from 404ing on hard reload (e.g., /users, /groups/123)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Do not cache the HTML shell so users always get the latest deployment
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Cache fingerprinted static assets aggressively for performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for production safety
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"